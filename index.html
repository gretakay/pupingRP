<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>pupingRP - 照客線上闖關系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 棋盤格子 RWD 連動 */
        .grid-board { 
            display: grid; 
            grid-template-columns: repeat(3, minmax(0, 1fr)); 
            grid-template-rows: repeat(3, minmax(0, 1fr)); 
            gap: 8px; 
        }
        @media (min-width: 400px) { .grid-board { gap: 12px; } }
        .btn-glow { box-shadow: 0 8px 20px -4px rgba(244, 63, 94, 0.3); }
        .btn-glow-blue { box-shadow: 0 8px 20px -4px rgba(59, 130, 246, 0.3); }

        /* 可讀性提升：主要介面文字放大 */
        #stage-list-zone h3 { font-size: 1.08rem; }
        #stage-list-zone p { font-size: 0.9rem; }
        #stage-list-zone span { font-size: 0.9rem; }
        #monopoly-title-ui { font-size: 1.35rem; }
        #score-label-ui { font-size: 0.95rem; }
        #score-display { font-size: 1.35rem; }
        #monopoly-modal .grid-board > div { font-size: 0.82rem; line-height: 1.2; }
        #dice-btn { font-size: 1rem; }
        #game-msg { font-size: 0.95rem; min-height: 48px; }
        #modal-tag { font-size: 0.9rem; }
        #modal-text { font-size: 1.08rem; }
        #modal-options button { font-size: 0.96rem; }

        @media (min-width: 640px) {
            #stage-list-zone h3 { font-size: 1.18rem; }
            #stage-list-zone p { font-size: 0.98rem; }
            #stage-list-zone span { font-size: 0.95rem; }
            #monopoly-modal .grid-board > div { font-size: 0.9rem; }
            #game-msg { font-size: 1rem; }
            #modal-text { font-size: 1.15rem; }
        }
    </style>
</head>
<body class="bg-indigo-50/60 font-sans min-h-screen flex flex-col items-center justify-start p-3 sm:p-6 md:p-8 selection:bg-indigo-200">

    <div class="w-full max-w-xl bg-white rounded-[2rem] shadow-xl p-5 sm:p-7 md:p-8 border border-indigo-100 mt-2 sm:mt-4 transition-all">
        <h2 class="text-xl sm:text-2xl font-black text-slate-800 mb-1 flex items-center gap-2">🗺️ pupingRP 修煉地圖</h2>
        <p class="text-xs text-slate-400 mb-5 sm:mb-6">完成首關服儀特訓，解鎖專業護班值班實戰挑戰。</p>
        <p id="app-version" class="text-[10px] text-slate-300 -mt-4 mb-4">版本: 載入中...</p>
        
        <div id="stage-list-zone" class="space-y-3 sm:space-y-4"></div>
    </div>

    <div id="monopoly-modal" class="hidden fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-3 sm:p-4 z-40 overflow-y-auto">
        <div class="bg-white rounded-[2rem] sm:rounded-[2.5rem] max-w-md w-full overflow-hidden shadow-2xl border border-white/20 p-4 sm:p-6 text-center my-auto transition-all">
            <div class="flex justify-between items-center mb-4">
                <h2 id="monopoly-title-ui" class="text-lg sm:text-xl font-black text-slate-800 flex items-center gap-1.5">🎲 第一關：服儀大富翁</h2>
                <button onclick="closeMonopolyModal()" class="w-7 h-7 sm:w-8 sm:h-8 bg-slate-100 text-slate-500 rounded-full font-bold text-xs sm:text-sm hover:bg-slate-200 transition flex items-center justify-center">✕</button>
            </div>
            
            <div class="bg-indigo-50/60 rounded-xl py-2 px-3 mb-4 flex justify-between items-center text-xs sm:text-sm">
                <span id="score-label-ui" class="font-bold text-slate-500">當前考核專業度</span>
                <span id="score-display" class="text-base sm:text-lg font-black text-emerald-500">0 分</span>
            </div>
            
            <div class="grid-board w-full aspect-square mb-4 max-w-[320px] sm:max-w-full mx-auto">
                <div id="cell-0" class="border border-indigo-200 bg-indigo-50 rounded-xl sm:rounded-2xl flex flex-col justify-center items-center text-[9px] sm:text-[11px] font-black text-indigo-700 relative shadow-inner p-1">
                    起點
                    <div id="player" class="absolute w-4 h-4 sm:w-5 sm:h-5 bg-rose-500 border-2 border-white rounded-full shadow transition-all duration-300"></div>
                </div>
                <div id="cell-1" class="border border-slate-200 bg-slate-50 rounded-xl sm:rounded-2xl flex justify-center items-center text-[9px] sm:text-[11px] font-bold text-slate-600 p-1">👔 衣服</div>
                <div id="cell-2" class="border border-slate-200 bg-slate-50 rounded-xl sm:rounded-2xl flex justify-center items-center text-[9px] sm:text-[11px] font-bold text-slate-600 p-1">🧦 襪子</div>
                <div id="cell-7" class="border border-slate-200 bg-slate-50 rounded-xl sm:rounded-2xl flex justify-center items-center text-[9px] sm:text-[11px] font-bold text-slate-600 p-1">🛑 抽查</div>
                <div class="bg-white"></div> 
                <div id="cell-3" class="border border-slate-200 bg-slate-50 rounded-xl sm:rounded-2xl flex justify-center items-center text-[9px] sm:text-[11px] font-bold text-slate-600 p-1">💈 髮型</div>
                <div id="cell-6" class="border border-slate-200 bg-slate-50 rounded-xl sm:rounded-2xl flex justify-center items-center text-[9px] sm:text-[11px] font-bold text-slate-600 p-1">🎁 機會</div>
                <div id="cell-5" class="border border-slate-200 bg-slate-50 rounded-xl sm:rounded-2xl flex justify-center items-center text-[9px] sm:text-[11px] font-bold text-slate-600 p-1">🚶 前進</div>
                <div id="cell-4" class="border border-slate-200 bg-slate-50 rounded-xl sm:rounded-2xl flex justify-center items-center text-[9px] sm:text-[11px] font-bold text-slate-600 p-1">📍 櫃檯</div>
            </div>
            
            <button id="dice-btn" onclick="rollDice()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold py-2.5 sm:py-3 rounded-xl text-xs sm:text-sm transition transform active:scale-95">🎲 擲骰子</button>
            <p id="game-msg" class="text-[11px] sm:text-xs font-medium text-slate-500 mt-3 bg-slate-50 p-2 rounded-lg min-h-[38px] flex items-center justify-center border border-slate-100">點擊上方按鈕開始值班準備！</p>
        </div>
    </div>

    <div id="game-modal" class="hidden fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-3 sm:p-4 z-50 overflow-y-auto">
        <div id="modal-card" class="bg-white rounded-[2rem] sm:rounded-[2.5rem] max-w-md w-full overflow-hidden shadow-2xl relative my-auto transition-all duration-300 scale-100">
            <button onclick="closeModal()" class="absolute top-3 right-3 sm:top-4 sm:right-4 w-7 h-7 sm:w-8 sm:h-8 bg-black/20 text-white rounded-full font-bold text-xs sm:text-sm flex items-center justify-center hover:bg-black/30 transition z-10">✕</button>
            <div id="modal-header-bg" class="pt-8 sm:pt-10 pb-5 sm:pb-6 px-4 sm:px-6 flex flex-col items-center text-white">
                <div id="modal-icon" class="w-16 h-16 sm:w-20 sm:h-20 bg-white rounded-full shadow-xl flex items-center justify-center mb-3 sm:mb-4 text-3xl sm:text-4xl"></div>
                <h2 id="modal-title" class="text-lg sm:text-xl font-black mb-0.5 tracking-wide text-center"></h2>
            </div>
            <div class="p-4 sm:p-6 bg-white text-center">
                <div id="modal-tag" class="inline-flex items-center bg-amber-50 border border-amber-200 text-amber-700 rounded-full px-3.5 sm:px-4 py-0.5 sm:py-1 text-[11px] sm:text-xs font-bold mb-3 sm:mb-4 shadow-sm"></div>
                <p id="modal-text" class="text-sm sm:text-base font-bold text-slate-700 leading-relaxed mb-5 sm:mb-6 text-left px-1 sm:px-2"></p>
                <div id="modal-options" class="space-y-2.5 sm:space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="hidden fixed inset-0 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2rem] max-w-lg w-full shadow-2xl border border-indigo-100 p-6 sm:p-7">
            <h2 class="text-2xl sm:text-3xl font-black text-slate-800">📝 請先填寫資料</h2>
            <p class="text-base sm:text-lg text-slate-500 mt-2 mb-5">姓名為必填，法名可略過。</p>

            <label for="profile-name-input" class="block text-lg font-bold text-slate-700 mb-2">姓名（必填）</label>
            <input id="profile-name-input" type="text" class="w-full border-2 border-indigo-200 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-300" placeholder="請輸入姓名">
            <p id="profile-name-error" class="hidden text-rose-600 text-sm mt-2 font-bold">請先輸入姓名再開始。</p>

            <label for="profile-dharma-input" class="block text-lg font-bold text-slate-700 mt-5 mb-2">法名（選填）</label>
            <input id="profile-dharma-input" type="text" class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="沒有可留空">

            <button onclick="savePlayerProfile()" class="w-full mt-6 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black py-3.5 rounded-xl text-lg transition transform active:scale-95">開始闖關</button>
        </div>
    </div>

    <script>
        const APP_VERSION = "2026-07-02-r4";

        let ALL_STAGES = [];
        let monopolyEvents = {};
        let currentPosition = 0;
        let score = 0; 
        let currentStoryStageId = null;
        let currentStoryNode = "start";
        let isReviewMode = false; 
        let isMonopolyReviewMode = false; 
        let profileResolver = null;

        // Google Form 串接設定：請替換成你自己的表單資訊
        const GOOGLE_FORM_ACTION_URL = "https://docs.google.com/forms/d/e/1FAIpQLSd3gR5HOeze0O5kqfncGMGJALhuJLwkImIZ57hpogD3vJNfsw/formResponse"; // 例如: https://docs.google.com/forms/d/e/FORM_ID/formResponse
        const GOOGLE_FORM_ENTRIES = {
            playerName: "entry.1160088",      // entry.xxxxx
            dharmaName: "entry.36714066",     // entry.xxxxx
            monopolyScore: "",   // entry.xxxxx
            monopolyPassed: "",  // entry.xxxxx
            stageId: "",         // entry.xxxxx
            stageCompleted: "",  // entry.xxxxx
            appVersion: "",      // entry.xxxxx
            eventType: "",       // entry.xxxxx
            eventTime: ""        // entry.xxxxx
        };

        function isGoogleFormConfigured() {
            return Boolean(
                GOOGLE_FORM_ACTION_URL &&
                GOOGLE_FORM_ENTRIES.playerName
            );
        }

        function getPlayerProfile() {
            const playerName = (localStorage.getItem('PlayerName') || '').trim();
            const dharmaName = (localStorage.getItem('DharmaName') || '').trim();
            return {
                playerName,
                dharmaName: dharmaName || ''
            };
        }

        function openProfileModal() {
            const nameInput = document.getElementById('profile-name-input');
            const dharmaInput = document.getElementById('profile-dharma-input');
            const nameError = document.getElementById('profile-name-error');
            const saved = getPlayerProfile();

            nameInput.value = saved.playerName;
            dharmaInput.value = saved.dharmaName;
            nameError.classList.add('hidden');
            document.getElementById('profile-modal').classList.remove('hidden');
            setTimeout(() => nameInput.focus(), 30);
        }

        function savePlayerProfile() {
            const nameInput = document.getElementById('profile-name-input');
            const dharmaInput = document.getElementById('profile-dharma-input');
            const nameError = document.getElementById('profile-name-error');
            const playerName = nameInput.value.trim();
            const dharmaName = dharmaInput.value.trim();

            if (!playerName) {
                nameError.classList.remove('hidden');
                nameInput.focus();
                return;
            }

            localStorage.setItem('PlayerName', playerName);
            if (dharmaName) {
                localStorage.setItem('DharmaName', dharmaName);
            } else {
                localStorage.removeItem('DharmaName');
            }

            document.getElementById('profile-modal').classList.add('hidden');
            if (profileResolver) {
                profileResolver(getPlayerProfile());
                profileResolver = null;
            }
        }

        function ensurePlayerProfile() {
            const profile = getPlayerProfile();
            if (profile.playerName) {
                return Promise.resolve(profile);
            }

            openProfileModal();
            return new Promise((resolve) => {
                profileResolver = resolve;
            });
        }

        function submitProgressToGoogleForm(payload) {
            if (!isGoogleFormConfigured()) return;

            const { playerName, dharmaName } = getPlayerProfile();
            if (!playerName) return;
            const formData = new FormData();

            // 只填已設定的欄位，避免欄位未建立時造成送出失敗
            const setIfConfigured = (entryId, value) => {
                if (entryId) formData.append(entryId, value == null ? '' : String(value));
            };

            setIfConfigured(GOOGLE_FORM_ENTRIES.playerName, playerName);
            setIfConfigured(GOOGLE_FORM_ENTRIES.dharmaName, dharmaName);
            setIfConfigured(GOOGLE_FORM_ENTRIES.monopolyScore, payload.monopolyScore);
            setIfConfigured(GOOGLE_FORM_ENTRIES.monopolyPassed, payload.monopolyPassed);
            setIfConfigured(GOOGLE_FORM_ENTRIES.stageId, payload.stageId);
            setIfConfigured(GOOGLE_FORM_ENTRIES.stageCompleted, payload.stageCompleted);
            setIfConfigured(GOOGLE_FORM_ENTRIES.appVersion, APP_VERSION);
            setIfConfigured(GOOGLE_FORM_ENTRIES.eventType, payload.eventType);
            setIfConfigured(GOOGLE_FORM_ENTRIES.eventTime, new Date().toISOString());

            fetch(GOOGLE_FORM_ACTION_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).catch((err) => {
                console.warn('Google Form 回報失敗:', err);
            });
        }

        function withVersion(path) {
            return `${path}?v=${encodeURIComponent(APP_VERSION)}`;
        }

        async function loadGameData() {
            try {
                document.getElementById('app-version').innerText = `版本: ${APP_VERSION}`;
                await ensurePlayerProfile();

                const fetchOptions = {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                };

                const stagesResponse = await fetch(withVersion('./data/stages.json'), fetchOptions);
                ALL_STAGES = await stagesResponse.json();
                const monopolyResponse = await fetch(withVersion('./data/monopoly.json'), fetchOptions);
                monopolyEvents = await monopolyResponse.json();
                
                updatePlayerPosition();
                renderStageList();
            } catch (error) {
                console.error("❌ 讀取關卡資料失敗", error);
            }
        }

        window.onload = loadGameData;

        // 簡化為雙關卡渲染
        function renderStageList() {
            const zone = document.getElementById('stage-list-zone');
            zone.innerHTML = '';
            const isMonopolyPassed = localStorage.getItem('DressCode') === 'Pass';
            const monopolySavedScore = localStorage.getItem('MonopolyScore');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 1. 第一關：大富翁
            const monopolyCard = document.createElement('div');
            monopolyCard.className = `p-3.5 sm:p-4 rounded-2xl border transition-all flex items-center justify-between ${
                isMonopolyPassed ? 'bg-emerald-50/70 border-emerald-300 cursor-pointer hover:bg-emerald-50' : 'bg-indigo-50/40 border-indigo-200 cursor-pointer hover:bg-indigo-50'
            }`;
            monopolyCard.onclick = openMonopolyModal;

            let monopolyStatusBadge = '<span class="text-xs font-bold text-indigo-600 animate-pulse">⚔️ 開始挑戰</span>';
            if (isMonopolyPassed) {
                monopolyStatusBadge = `<span class="text-xs font-bold text-emerald-600 flex flex-col items-end"><span>✅ 考核通過</span><span class="text-[10px] font-normal text-slate-400 mt-0.5">成績: ${monopolySavedScore}分 (可複習)</span></span>`;
            }

            monopolyCard.innerHTML = `
                <div class="flex items-center gap-3 sm:gap-4 text-left">
                    <div class="text-2xl sm:text-3xl">🎲</div>
                    <div>
                        <h3 class="font-black text-slate-700 text-sm sm:text-base">第一關：服儀大富翁</h3>
                        <p class="text-[11px] text-slate-400 mt-0.5">${isMonopolyPassed ? '您已取得過關證書，點擊即可再次進入複習' : '點擊進入，完成基礎服儀特訓'}</p>
                    </div>
                </div>
                <div>${monopolyStatusBadge}</div>
            `;
            zone.appendChild(monopolyCard);

            // 2. 第二關：13項值班挑戰
            ALL_STAGES.forEach(stage => {
                const isPassed = localStorage.getItem(stage.id) === 'Completed';
                const openDate = stage.openDate ? new Date(`${stage.openDate}T00:00:00`) : null;
                const isDateOpen = !openDate || today >= openDate;
                const isUnlocked = isMonopolyPassed && isDateOpen;
                const card = document.createElement('div');
                card.className = `p-3.5 sm:p-4 rounded-2xl border transition-all flex items-center justify-between ${
                    isPassed ? 'bg-emerald-50 border-emerald-300 cursor-pointer hover:bg-emerald-50' :
                    isUnlocked ? 'bg-indigo-50/40 border-indigo-200 cursor-pointer hover:bg-indigo-50' : 'bg-slate-50 border-slate-200 opacity-60'
                }`;

                if (isUnlocked || isPassed) { card.onclick = () => startStoryStage(stage.id); }

                let statusBadge = `<span class="text-xs font-bold text-rose-400">🔒 需先通過服儀關</span>`;
                if (isMonopolyPassed && !isDateOpen) { statusBadge = `<span class="text-xs font-bold text-amber-500">⏳ ${stage.openDate} 開放</span>`; }
                else if (isUnlocked && !isPassed) { statusBadge = `<span class="text-xs font-bold text-indigo-600 animate-pulse">⚔️ 開始值班挑戰</span>`; } 
                else if (isPassed) { statusBadge = `<span class="text-xs font-bold text-emerald-600">✅ 考核完成 (可複習)</span>`; }

                card.innerHTML = `<div class="flex items-center gap-3 sm:gap-4 text-left"><div class="text-2xl sm:text-3xl">${stage.icon}</div><div><h3 class="font-black text-slate-700 text-sm sm:text-base">${stage.title}</h3><p class="text-[11px] text-slate-400 mt-0.5">${stage.desc}</p></div></div><div>${statusBadge}</div>`;
                zone.appendChild(card);
            });
        }

        function openMonopolyModal() { 
            isReviewMode = false;
            if (localStorage.getItem('DressCode') === 'Pass') {
                isMonopolyReviewMode = true;
                document.getElementById('monopoly-title-ui').innerText = "🔄 服儀大富翁 (複習模式)";
                document.getElementById('score-label-ui').innerText = "本次複習專業度";
            } else {
                isMonopolyReviewMode = false;
                document.getElementById('monopoly-title-ui').innerText = "🎲 第一關：服儀大富翁";
                document.getElementById('score-label-ui').innerText = "當前考核專業度";
            }
            currentPosition = 0; score = 0;
            document.getElementById('score-display').innerText = `0 分`;
            document.getElementById('score-display').className = "text-base sm:text-lg font-black text-emerald-500";
            document.getElementById('game-msg').innerText = isMonopolyReviewMode ? "進入複習模式！挑戰不影響下關解鎖狀態。" : "點擊上方按鈕開始值班準備！";
            updatePlayerPosition();
            document.getElementById('monopoly-modal').classList.remove('hidden'); 
        }
        
        function closeMonopolyModal() { document.getElementById('monopoly-modal').classList.add('hidden'); }

        function rollDice() {
            document.getElementById('dice-btn').disabled = true;
            const steps = Math.floor(Math.random() * 3) + 1;
            currentPosition = (currentPosition + steps) % 8;
            updatePlayerPosition();
            document.getElementById('game-msg').innerText = `🎲 骰子轉動... 擲出了 ${steps} 點！`;
            setTimeout(() => { triggerMonopolyCell(currentPosition); }, 600);
        }

        function updatePlayerPosition() {
            const cell = document.getElementById(`cell-${currentPosition}`);
            if(cell) cell.appendChild(document.getElementById('player'));
        }

        function triggerMonopolyCell(pos) {
            if (pos === 0) {
                if (score >= 75) { 
                    if (!isMonopolyReviewMode) {
                        document.getElementById('game-msg').innerHTML = `🎉 <span class='text-emerald-600 font-bold'>考核通過！</span> 回到起點完成結算，首通分數 ${score} 分，第二關解鎖。`;
                        localStorage.setItem('DressCode', 'Pass');
                        localStorage.setItem('MonopolyScore', score);
                        submitProgressToGoogleForm({
                            eventType: 'monopoly_pass',
                            monopolyScore: score,
                            monopolyPassed: 'Pass',
                            stageId: 'DressCode',
                            stageCompleted: 'Completed'
                        });
                    } else {
                        document.getElementById('game-msg').innerHTML = `🎉 <span class='text-blue-600 font-bold'>複習完成！</span> 回到起點完成本次複習，得分: ${score} 分 (不影響原本進度)。`;
                        submitProgressToGoogleForm({
                            eventType: 'monopoly_review',
                            monopolyScore: score,
                            monopolyPassed: 'Pass',
                            stageId: 'DressCode',
                            stageCompleted: 'Review'
                        });
                    }
                    setTimeout(() => { closeMonopolyModal(); renderStageList(); }, 2500);
                } else { 
                    document.getElementById('game-msg').innerText = `已回到起點，目前 ${score} 分，未達 75 分，繼續挑戰累積專業度！`;
                }
                document.getElementById('dice-btn').disabled = false;
                return;
            }
            if (monopolyEvents[pos]) {
                const data = monopolyEvents[pos]; isReviewMode = false; showQuizUI(data, pos);
            } else {
                document.getElementById('game-msg').innerText = "安全通過，繼續整備！"; document.getElementById('dice-btn').disabled = false;
            }
        }

        function showQuizUI(data, pos) {
            showModal({
                bg: "from-blue-400 to-indigo-500", icon: data.icon, title: data.title, tag: data.tag, text: data.text,
                options: data.options.map(opt => ({
                    text: opt.text,
                    action: () => {
                        if (opt.correct) {
                            score += 25; 
                            document.getElementById('score-display').innerText = `${score} 分`;
                            document.getElementById('score-display').className = "text-base sm:text-lg font-black text-emerald-500";
                            closeModal();
                            document.getElementById('game-msg').innerText = "答案正確！專業度獲得提升！";
                            document.getElementById('dice-btn').disabled = false;
                        } else {
                            const penalty = Number(opt.penalty) || 0;
                            if (penalty > 0) {
                                score = Math.max(0, score - penalty);
                                document.getElementById('score-display').innerText = `${score} 分`;
                                document.getElementById('score-display').className = "text-base sm:text-lg font-black text-rose-500";
                            }
                            isReviewMode = true;
                            showModal({
                                bg: "from-rose-500 to-red-600", icon: "❌", title: "服儀規格不符！", tag: "💡 錯誤分析詳解", text: opt.feedback,
                                options: [{
                                    text: "我了解了，回關卡繼續努力",
                                    action: () => {
                                        closeModal();
                                        document.getElementById('game-msg').innerText = penalty > 0
                                            ? `剛剛答錯了，扣 ${penalty} 分。請繼續前進。`
                                            : "剛剛答錯了，錯失加分機會！請繼續前進。";
                                        document.getElementById('dice-btn').disabled = false;
                                    }
                                }]
                            });
                        }
                    }
                }))
            });
        }

        function resetMonopoly(msg) {
            currentPosition = 0; score = 0;
            document.getElementById('score-display').innerText = `0 分`;
            document.getElementById('score-display').className = "text-base sm:text-lg font-black text-emerald-500";
            updatePlayerPosition(); document.getElementById('game-msg').innerText = msg;
        }

        function startStoryStage(stageId) {
            isReviewMode = false;
            currentStoryStageId = stageId;
            currentStoryNode = "start";
            renderStoryNode();
        }

        function renderStoryNode() {
            const stage = ALL_STAGES.find(s => s.id === currentStoryStageId);
            const node = stage.script[currentStoryNode];
            const isStageAlreadyPassed = localStorage.getItem(currentStoryStageId) === 'Completed';

            showModal({
                bg: "from-purple-500 to-indigo-600", icon: "🤝", 
                title: isStageAlreadyPassed ? `${stage.title} (複習模式)` : stage.title, 
                tag: node.tag, text: node.text,
                options: node.options.map(opt => ({
                    text: opt.text,
                    action: () => {
                        if (opt.resetStory) { 
                            currentStoryNode = "start"; renderStoryNode(); 
                        } else if (opt.finishStory) { 
                            if (!isStageAlreadyPassed) {
                                localStorage.setItem(currentStoryStageId, 'Completed');
                                submitProgressToGoogleForm({
                                    eventType: 'stage_pass',
                                    monopolyScore: Number(localStorage.getItem('MonopolyScore') || 0),
                                    monopolyPassed: localStorage.getItem('DressCode') === 'Pass' ? 'Pass' : 'NotPass',
                                    stageId: currentStoryStageId,
                                    stageCompleted: 'Completed'
                                });
                                alert("🎉 恭喜圓滿通過一日值班實戰考核！");
                            } 
                            else { alert("🔄 複習完成！護班細節掌握得非常棒！"); }
                            closeModal(); renderStageList(); 
                        } else { 
                            currentStoryNode = opt.next; renderStoryNode(); 
                        }
                    }
                }))
            });
        }

        function showModal(config) {
            document.getElementById('modal-header-bg').className = `bg-gradient-to-b ${config.bg} pt-8 sm:pt-10 pb-5 sm:pb-6 px-4 sm:px-6 flex flex-col items-center text-white`;
            document.getElementById('modal-icon').innerText = config.icon;
            document.getElementById('modal-title').innerText = config.title;
            document.getElementById('modal-tag').innerText = config.tag;
            document.getElementById('modal-text').innerText = config.text;
            const optZone = document.getElementById('modal-options'); optZone.innerHTML = '';
            config.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = isReviewMode 
                    ? "w-full text-center bg-gradient-to-r from-blue-500 to-indigo-600 hover:opacity-90 text-white font-black py-2.5 sm:py-3 px-4 rounded-full text-xs sm:text-sm transition transform active:scale-95 btn-glow-blue tracking-wider"
                    : "w-full text-left bg-gradient-to-r from-pink-400 via-orange-400 to-yellow-400 hover:opacity-90 text-white font-black py-2.5 sm:py-3 px-4 rounded-xl text-xs sm:text-sm transition transform active:scale-95 btn-glow tracking-wider";
                btn.innerText = opt.text; btn.onclick = opt.action; optZone.appendChild(btn);
            });
            document.getElementById('game-modal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('game-modal').classList.add('hidden'); 
            if(!isReviewMode && document.getElementById('monopoly-modal').classList.contains('hidden') === false) {
                 document.getElementById('dice-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
